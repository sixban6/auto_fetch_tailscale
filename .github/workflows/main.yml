name: Daily Fetch Tailscale to Release

on:
  schedule:
    # 每天 UTC 凌晨 2 点自动运行
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      version:
        description: '指定版本号 (留空则抓取官方最新稳定版，无需加 v)'
        required: false
        default: ''

jobs:
  fetch-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 获取官方绝对最新版本号并下载
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            # 放弃 GitHub API，直接从 Tailscale 官方包服务器读取最新稳定版 JSON
            VERSION=$(curl -s "https://pkgs.tailscale.com/stable/?mode=json" | jq -r .Version)
          fi
          
          # 防呆处理：如果手动输入了带 v 的版本号 (如 v1.78.1)，自动剔除 v
          VERSION="${VERSION#v}"
          
          echo "TAILSCALE_VERSION=$VERSION" >> $GITHUB_ENV
          echo "🎯 成功获取官方最新版本: $VERSION"
          
          # Linux / OpenWrt 必备通用静态包 (tgz)
          wget -nv -O tailscale_${VERSION}_amd64.tgz https://pkgs.tailscale.com/stable/tailscale_${VERSION}_amd64.tgz
          wget -nv -O tailscale_${VERSION}_arm64.tgz https://pkgs.tailscale.com/stable/tailscale_${VERSION}_arm64.tgz
          
          # Debian / Ubuntu 离线包 (官方 pool 隐藏路径)
          wget -nv -O tailscale_${VERSION}_amd64_ubuntu.deb https://pkgs.tailscale.com/stable/ubuntu/pool/tailscale_${VERSION}_amd64.deb
          wget -nv -O tailscale_${VERSION}_amd64_debian.deb https://pkgs.tailscale.com/stable/debian/pool/tailscale_${VERSION}_amd64.deb

      - name: 安装 UPX 压缩工具
        run: |
          sudo apt-get update
          sudo apt-get install -y upx-ucl

      - name: 仅对 ARM 架构进行 UPX 加壳并原样重新打包
        run: |
          VERSION="${{ env.TAILSCALE_VERSION }}"
          
          # 指定只处理 arm64 架构
          ARCH="arm64"
          DIR_NAME="tailscale_${VERSION}_${ARCH}"
          TGZ_NAME="${DIR_NAME}.tgz"
          
          echo "📦 正在解压 ${TGZ_NAME}..."
          tar -xzf ${TGZ_NAME}
          
          echo "🗜️ 正在对 ${ARCH} 架构内的二进制文件进行 UPX 加壳..."
          upx -9 ${DIR_NAME}/tailscale
          upx -9 ${DIR_NAME}/tailscaled
          
          echo "🔄 正在重新打包回原压缩包名: ${TGZ_NAME}..."
          # 删除原有的未加壳压缩包，然后重新以相同的名字打包
          rm ${TGZ_NAME}
          tar -czf ${TGZ_NAME} ${DIR_NAME}
          
          # 清理解压出来的临时文件夹
          rm -rf ${DIR_NAME}
          echo "✅ ${ARCH} 架构处理完毕！(amd64 架构保持原样)"

      - name: 清理旧的 Release 页面
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --cleanup-tag -y || true

      - name: 发布全新 Release 并上传文件
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Tailscale 最新全平台离线包"
          body: |
            ### 🤖 自动同步完成 (直连官方服务器，零延迟)
            - **官方稳定版本**: `${{ env.TAILSCALE_VERSION }}`
            
            ### 📦 文件说明：
            - `*_arm64.tgz`: 适用于 OpenWrt/ARM 设备的包。**内置二进制文件已使用 UPX 极限压缩**，大幅减小 ROM 占用，包名及内部结构与官方完全一致。
            - `*_amd64.tgz`: 官方原版，未进行 UPX 压缩。
            - `*.deb`: 适用于 Debian/Ubuntu 的官方原版离线安装包。
            
            你可以使用 `ghproxy` 等镜像服务加速下载。
          files: |
            *.tgz
            *.deb
